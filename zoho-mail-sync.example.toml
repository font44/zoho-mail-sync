# [concurrency]
# max_concurrent_requests              = 8     # max in-flight Zoho HTTP requests
# num_folders_to_process_concurrently  = 100   # folder-list fan-out width
# rate_limit_rps                       = 10    # token-bucket steady-state requests/sec
# max_retries                          = 2     # additional attempts after the first failure
