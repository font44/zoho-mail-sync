# data_dir = "/home/me/Mail"

# accounts_url = "https://accounts.zoho.com"
# api_url      = "https://mail.zoho.com"

# [concurrency]
# max_concurrent    = 8     # max in-flight Zoho API requests
# rate_limit_rps    = 10    # token-bucket steady-state requests/sec
# rate_limit_burst  = 20    # token-bucket burst size
# max_retries       = 5     # retries on 429 / 5xx / transport errors
# base_backoff_ms   = 250   # exponential backoff base, doubled per attempt
# page_limit        = 200   # message list page size
