name: Update dependencies

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Update flake inputs
        run: nix flake update
      - name: Update Cargo lockfile
        run: nix develop --command cargo update
      - name: Verify build
        run: nix build .#default
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: deps/weekly-update
          title: "deps: weekly update"
          commit-message: "deps: weekly update (flake.lock + Cargo.lock)"
          body: |
            Automated weekly update of `flake.lock` and `Cargo.lock`.

            Verified with `nix build .#default`.
          add-paths: |
            flake.lock
            Cargo.lock
          delete-branch: true
